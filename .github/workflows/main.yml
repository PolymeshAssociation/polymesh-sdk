name: CI

on:
  push:
    branches: [master, develop, next]
  pull_request:
    types: [assigned, opened, synchronize, reopened]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: install dependencies
        run: yarn install --immutable
      - name: lint
        run: yarn lint

  test:
    name: Testing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: install dependencies
        run: yarn install --immutable
      - name: test
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: yarn test --runInBand --shard=${{ matrix.shard }}/${{ strategy.job-total }}
      - name: Rename coverage to shard coverage
        run: |
          mv coverage/clover.xml coverage/clover-${{matrix.shard}}.xml
          mv coverage/lcov.info coverage/lcov-${{matrix.shard}}.info
          mv coverage/coverage-final.json coverage/coverage-${{matrix.shard}}.json
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts-${{ matrix.shard }}-${{ strategy.job-index }}
          path: coverage/

  sonar:
    name: Merge coverage and SonarCloud scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: coverage-artifacts-*
          merge-multiple: true
          path: coverage
      - name: Process Coverage
        run: npx nyc report --reporter lcov --reporter text --reporter clover -t coverage
      - name: sonarcloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
      - uses: geekyeggo/delete-artifact@v5
        with:
          name: coverage-artifacts-*
          failOnError: false

  release:
    name: Building and releasing project
    runs-on: ubuntu-latest
    needs: [lint, sonar]
    if: github.event_name == 'push'
    permissions:
      contents: write # push release commits, tags, create GitHub Releases
      issues: write # @semantic-release/github comments on resolved issues
      pull-requests: write # @semantic-release/github comments on merged PRs
      id-token: write # OIDC token for npm trusted publishing
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: install dependencies
        run: yarn install --immutable
      - name: build
        run: |
          yarn build:ts
          sed 's/dist\//.\//' package.json > dist/package.json
          cp README.md dist/README.md
          cp yarn.lock dist/yarn.lock
          cp -R node_modules dist/node_modules
          cp .releaserc.js dist/.releaserc.js
      # - name: integration test
      #   run: yarn test:integration
      - name: release
        env:
          GITHUB_TOKEN: ${{ secrets.ASSOCIATION_RELEASE_TOKEN }}
        run: |
          cd dist
          yarn install --immutable
          yarn semantic-release

  check-fast-forward:
    name: Check if fast forwarding is possible
    runs-on: ubuntu-latest
    needs: [lint, sonar]
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      # We appear to need write permission for both pull-requests and
      # issues in order to post a comment to a pull request.
      pull-requests: write
      issues: write

    steps:
      - name: Checking if fast forwarding is possible
        uses: sequoia-pgp/fast-forward@v1
        with:
          merge: false
          # To reduce the workflow's verbosity, use 'on-error'
          # to only post a comment when an error occurs, or 'never' to
          # never post a comment.  (In all cases the information is
          # still available in the step's summary.)
          comment: never
